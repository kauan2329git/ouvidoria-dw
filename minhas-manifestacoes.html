<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minhas Manifestações — Ouvidoria Digital EEEP Dom Walfrido</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/manifestacao.css">
  <link rel="stylesheet" href="assets/css/minhas-manifestacoes.css">
</head>
<body>

  <!--
    BUG-01 CORRIGIDO: navbar não mais copiada com links quebrados
    BUG-06 CORRIGIDO: links de âncora apontam para manifestacao.html#section
    BUG-05 CORRIGIDO: id="navLoginBtn" presente para o JS atualizar
    BUG-10 CORRIGIDO: botão de logout injetado via JS (antes era #btnSair que não existia no HTML)
  -->
  <nav class="home-nav" id="homeNav">
    <div class="nav-inner">
      <a href="manifestacao.html" class="nav-logo-wrap">
        <img src="assets/img/logo2 (2).jpeg" alt="Logo EEEP Dom Walfrido" class="nav-logo-img">
        <div class="nav-logo-text">
          <strong>Ouvidoria Digital</strong>
          <span>EEEP Dom Walfrido</span>
        </div>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="manifestacao.html#como-funciona">Como Funciona</a>
        <a href="manifestacao.html#registrar">Registrar</a>
        <a href="consulta.html">Consultar Protocolo</a>
        <a href="minhas-manifestacoes.html" class="active">Minhas Manifestações</a>
        <a id="navLoginBtn" href="login.html" class="nav-btn-login">
          <i class="bi bi-person-lock"></i> Área do Gestor
        </a>
      </div>
      <button class="nav-hamburger" id="navHamburger" aria-label="Menu">
        <i class="bi bi-list"></i>
      </button>
    </div>
  </nav>

  <div class="painel-header">
    <h1><i class="bi bi-collection me-2"></i>Minhas Manifestações</h1>
    <p id="userGreeting">Carregando...</p>
  </div>

  <div class="stats-row">
    <div class="stat-card sc-total">
      <div class="sn" id="statTotal">—</div>
      <div class="sl">Total</div>
    </div>
    <div class="stat-card sc-pend">
      <div class="sn" id="statPend">—</div>
      <div class="sl">Em aberto</div>
    </div>
    <div class="stat-card sc-res">
      <div class="sn" id="statRes">—</div>
      <div class="sl">Resolvidas</div>
    </div>
  </div>

  <div class="main-content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
      <div class="filtros-bar" style="margin-bottom:0">
        <button class="filtro-btn active" data-filtro="todos">Todos</button>
        <button class="filtro-btn" data-filtro="pendente">Pendentes</button>
        <button class="filtro-btn" data-filtro="em_analise">Em análise</button>
        <button class="filtro-btn" data-filtro="resolvido">Resolvidos</button>
      </div>
      <a href="manifestacao.html#registrar" class="btn-dw btn-dw-orange" style="font-size:.82rem;padding:7px 16px">
        <i class="bi bi-plus-circle me-1"></i>Nova
      </a>
    </div>
    <div id="listaMf">
      <div class="empty-state">
        <i class="bi bi-arrow-clockwise" style="animation:spin .8s linear infinite"></i>
        <p>Carregando manifestações...</p>
      </div>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="assets/js/minhas-manifestacoes.js"></script>
</body>
</html>
