<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minhas Manifestações — Ouvidoria Digital EEEP Dom Walfrido</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/manifestacao.css">
  <link rel="stylesheet" href="assets/css/minhas-manifestacoes.css">
</head>
<body>

  <!-- Navbar -->
    <nav class="home-nav" id="homeNav">
    <div class="nav-inner">
      <a href="manifestacao.html" class="nav-logo-wrap">
        <img src="assets/img/logo2 (2).jpeg" alt="Logo EEEP Dom Walfrido" class="nav-logo-img">
        <div class="nav-logo-text">
          <strong>Ouvidoria Digital</strong>
          <span>EEEP Dom Walfrido</span>
        </div>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="consulta.html">Consulta</a>
        <a href="minhas-manifestacoes.html">Minhas Manifestações</a>
        <a href="#como-funciona">Como Funciona</a>
        <a href="#registrar">Registrar</a>
        <a href="#lgpd">Privacidade</a>
        <a href="login.html" class="nav-btn-login"><i class="bi bi-person-circle me-1"></i>Área do Gestor</a>
      </div>
      <button class="nav-hamburger" id="navHamburger"><i class="bi bi-list"></i></button>
    </div>
  </nav>

  <!-- Painel header -->
  <div class="painel-header">
    <h1><i class="bi bi-collection me-2"></i>Minhas Manifestações</h1>
    <p id="userGreeting">Carregando...</p>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card sc-total">
      <div class="sn" id="statTotal">—</div>
      <div class="sl">Total</div>
    </div>
    <div class="stat-card sc-pend">
      <div class="sn" id="statPend">—</div>
      <div class="sl">Em aberto</div>
    </div>
    <div class="stat-card sc-res">
      <div class="sn" id="statRes">—</div>
      <div class="sl">Resolvidas</div>
    </div>
  </div>

  <!-- Conteúdo -->
  <div class="main-content">

    <!-- Ações rápidas -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:0;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
      <div class="filtros-bar" style="margin-bottom:0">
        <button class="filtro-btn active" data-filtro="todos">Todos</button>
        <button class="filtro-btn" data-filtro="pendente">Pendentes</button>
        <button class="filtro-btn" data-filtro="em_analise">Em análise</button>
        <button class="filtro-btn" data-filtro="resolvido">Resolvidos</button>
      </div>
      <a href="manifestacao.html#registrar" class="btn-dw btn-dw-orange" style="font-size:.82rem;padding:7px 16px">
        <i class="bi bi-plus-circle me-1"></i>Nova
      </a>
    </div>

    <!-- Lista -->
    <div id="listaMf">
      <div class="empty-state">
        <i class="bi bi-arrow-clockwise" style="animation:spin .8s linear infinite"></i>
        <p>Carregando manifestações...</p>
      </div>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    /* ── Helpers ── */
    function toast(msg, type, ms) {
      ms = ms || 3500;
      var icons = { success:'bi-check-circle-fill', error:'bi-x-circle-fill', warning:'bi-exclamation-triangle-fill' };
      var $t = $('<div class="dw-t t-'+type+'"><i class="bi '+icons[type]+' ti"></i><span>'+msg+'</span><i class="bi bi-x tc"></i></div>');
      $('#toastWrap').append($t);
      $t.find('.tc').on('click',function(){ $t.remove(); });
      setTimeout(function(){ $t.fadeOut(300,function(){ $t.remove(); }); }, ms);
    }

    var statusLabels = {
      pendente:   ['Pendente',   'sb-pendente',   'bi-hourglass-split'],
      em_analise: ['Em Análise', 'sb-em_analise', 'bi-search'],
      resolvido:  ['Resolvido',  'sb-resolvido',  'bi-check-circle-fill'],
      arquivado:  ['Arquivado',  'sb-arquivado',  'bi-archive']
    };
    var catLabels = {
      infraestrutura:'Infraestrutura', ensino:'Ensino', convivencia:'Convivência',
      elogio:'Elogio', sugestao:'Sugestão', denuncia:'Denúncia', outros:'Outros'
    };
    var catIcons = {
      infraestrutura:'bi-building', ensino:'bi-book-half', convivencia:'bi-people',
      elogio:'bi-star', sugestao:'bi-lightbulb', denuncia:'bi-exclamation-triangle', outros:'bi-three-dots'
    };
    var urgLabels = { normal:'Normal', alta:'Alta', urgente:'Urgente' };
    var urgColors = { normal:'var(--text-muted)', alta:'var(--orange)', urgente:'#dc2626' };

    function formatDate(d) {
      if (!d) return '—';
      var dt = new Date(d.replace(' ','T'));
      return dt.toLocaleDateString('pt-BR') + ' às ' + dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    }
    function esc(s) { return $('<span>').text(s||'').html(); }

    /* ── Guarda manifests e filtro atual ── */
    var todasMf = [];
    var filtroAtual = 'todos';

    /* ── Verifica login ── */
    var usuario = null;
    try { usuario = JSON.parse(sessionStorage.getItem('dw_user')); } catch(e){}
    if (!usuario || !usuario.id) {
      // Não está logado — redireciona
      window.location.href = 'login.html';
    }

    /* ── Exibe saudação ── */
    var primeiroNome = (usuario.nome || '').split(' ')[0];
    $('#userGreeting').text('Olá, ' + primeiroNome + '! Aqui estão todas as suas manifestações.');

    /* ── Sair ── */
    $('#btnSair').on('click', function(e){
      e.preventDefault();
      sessionStorage.removeItem('dw_user');
      window.location.href = 'manifestacao.html';
    });

    /* ── Filtros ── */
    $(document).on('click', '.filtro-btn', function(){
      $('.filtro-btn').removeClass('active');
      $(this).addClass('active');
      filtroAtual = $(this).data('filtro');
      renderLista();
    });

    /* ── Carregar manifestações ── */
    function carregarMf() {
      $.ajax({
        url: 'api/auth.php', method: 'POST',
        data: { action: 'minhas_manifestacoes', user_id: usuario.id },
        dataType: 'json',
        success: function(res) {
          if (!res || !res.sucesso) {
            mostrarErro();
            return;
          }
          todasMf = res.manifestacoes || [];

          // Stats
          var total = todasMf.length;
          var pend  = todasMf.filter(function(m){ return m.status === 'pendente' || m.status === 'em_analise'; }).length;
          var res2  = todasMf.filter(function(m){ return m.status === 'resolvido'; }).length;
          $('#statTotal').text(total);
          $('#statPend').text(pend);
          $('#statRes').text(res2);

          renderLista();
        },
        error: function() { mostrarErro(); }
      });
    }

    function mostrarErro() {
      $('#listaMf').html(
        '<div class="empty-state">' +
          '<i class="bi bi-wifi-off" style="color:var(--orange)"></i>' +
          '<h5>Erro de conexão</h5>' +
          '<p>Não foi possível carregar suas manifestações. <a href="#" onclick="carregarMf();return false;">Tentar novamente</a></p>' +
        '</div>'
      );
    }

    function renderLista() {
      var lista = filtroAtual === 'todos'
        ? todasMf
        : todasMf.filter(function(m){ return m.status === filtroAtual; });

      if (!lista.length) {
        var msgs = {
          todos: ['bi-inbox','Nenhuma manifestação ainda','Você ainda não registrou nenhuma manifestação.'],
          pendente: ['bi-hourglass','Nenhuma pendente','Não há manifestações pendentes.'],
          em_analise: ['bi-search','Nenhuma em análise','Não há manifestações em análise.'],
          resolvido: ['bi-check-circle','Nenhuma resolvida','Nenhuma manifestação foi resolvida ainda.']
        };
        var m = msgs[filtroAtual] || msgs['todos'];
        $('#listaMf').html(
          '<div class="empty-state">' +
            '<i class="bi '+ m[0] +'"></i>' +
            '<h5>'+ m[1] +'</h5>' +
            '<p>'+ m[2] +'</p>' +
            (filtroAtual === 'todos' ? '<a href="manifestacao.html#registrar" class="btn-dw btn-dw-orange" style="margin-top:1rem;display:inline-flex">Nova Manifestação</a>' : '') +
          '</div>'
        );
        return;
      }

      var html = '';
      lista.forEach(function(m, idx) {
        var st   = statusLabels[m.status] || ['Desconhecido','sb-pendente','bi-question-circle'];
        var cat  = catLabels[m.categoria]  || m.categoria;
        var catI = catIcons[m.categoria]   || 'bi-tag';
        var urg  = urgLabels[m.urgencia]   || m.urgencia;
        var urgC = urgColors[m.urgencia]   || 'var(--text-muted)';

        html +=
          '<div class="mf-card" id="mfc-'+idx+'">' +
            '<div class="mf-card-head" onclick="toggleCard('+idx+')">' +
              '<div class="mf-card-head-left">' +
                '<div class="mf-card-prot">'+ esc(m.protocolo) +'</div>' +
                '<div class="mf-card-ass">'+ esc(m.assunto) +'</div>' +
              '</div>' +
              '<div class="mf-card-meta">' +
                '<span class="cat-badge"><i class="bi '+catI+'"></i>'+ esc(cat) +'</span>' +
                '<span class="status-badge '+st[1]+'"><i class="bi '+st[2]+'"></i>'+ st[0] +'</span>' +
                (m.status === 'resolvido' ? '<i class="bi bi-check2-circle" style="color:var(--green);font-size:1.1rem" title="Resolvido"></i>' : '') +
              '</div>' +
              '<i class="bi bi-chevron-down mf-card-chevron"></i>' +
            '</div>' +
            '<div class="mf-card-body">' +
              '<div class="mf-row"><span class="mf-label"><i class="bi bi-calendar3 me-1"></i>Registrado em</span><span class="mf-value">'+ formatDate(m.criado_em) +'</span></div>' +
              '<div class="mf-row"><span class="mf-label"><i class="bi bi-flag me-1"></i>Urgência</span><span class="mf-value" style="color:'+urgC+';font-weight:600">'+ esc(urg) +'</span></div>' +
              '<div class="mf-row"><span class="mf-label"><i class="bi bi-eye me-1"></i>Sigilo</span><span class="mf-value">'+ (m.sigilo === 'sim' ? '🔒 Sigiloso' : 'Não sigiloso') +'</span></div>' +
              (m.resolvido_em ? '<div class="mf-row"><span class="mf-label"><i class="bi bi-check-circle me-1"></i>Resolvido em</span><span class="mf-value" style="color:var(--green)">'+ formatDate(m.resolvido_em) +'</span></div>' : '') +
              '<div class="mf-desc-box">' +
                '<div class="mf-desc-label">Descrição</div>' +
                esc(m.descricao).replace(/\n/g,'<br>') +
              '</div>' +
              (m.resposta
                ? '<div class="resp-box"><div class="resp-label"><i class="bi bi-reply-fill me-1"></i>Resposta da Ouvidoria</div><p>'+ esc(m.resposta).replace(/\n/g,'<br>') +'</p></div>'
                : '<div style="margin-top:.6rem;padding:.7rem 1rem;background:#fffbf5;border-radius:10px;border:1.5px dashed rgba(244,121,32,.25);font-size:.8rem;color:var(--text-muted);text-align:center">' +
                    '<i class="bi bi-hourglass-split me-1" style="color:var(--orange)"></i>Aguardando resposta da equipe' +
                  '</div>'
              ) +
              '<button class="btn-prot-share" onclick="compartilhar(\''+ esc(m.protocolo) +'\')"><i class="bi bi-share"></i>Compartilhar protocolo</button>' +
            '</div>' +
          '</div>';
      });

      $('#listaMf').html(html);
    }

    function toggleCard(idx) {
      var $c = $('#mfc-' + idx);
      $c.toggleClass('open');
    }

    function compartilhar(prot) {
      var url = window.location.origin + window.location.pathname.replace('minhas-manifestacoes.html','') + 'consulta.html?p=' + encodeURIComponent(prot);
      if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(function(){
          toast('Link copiado! Cole para compartilhar a consulta.', 'success');
        });
      } else {
        toast('Link: ' + url, 'warning', 6000);
      }
    }

    carregarMf();
  </script>
</body>
</html>
