<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ouvidoria Digital | Dom Walfrido</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="assets/css/style2.css">
</head>
<body>

    <button class="btn-menu-toggle d-lg-none" id="openSidebar">
        <i class="fa-solid fa-bars-staggered"></i>
    </button>

    <nav class="sidebar shadow" id="mainSidebar">
        <div class="sidebar-header">
            <div class="logo-container-circle">
                <img src="assets/img/logo2 (2).jpeg" alt="Logo Dom Walfrido" class="sidebar-logo-img">
            </div>
            <div class="brand-text ms-2">
                <span class="fw-bold text-white d-block">Ouvidoria DW</span>
                <span class="text-orange small fw-bold" style="font-size: 0.65rem;">DOM WALFRIDO</span>
            </div>
            <button class="btn-close-sidebar d-lg-none" id="closeSidebar">&times;</button>
        </div>
        
        <ul class="nav flex-column mt-4 px-3">
            <li class="nav-item">
                <a href="#" class="nav-link-custom active"><i class="fa-solid fa-house me-3"></i>Início</a>
            </li>
            <li class="nav-item">
                <a href="#sobre" class="nav-link-custom"><i class="fa-solid fa-circle-info me-3"></i>Sobre o Projeto</a>
            </li>
            <li class="nav-item">
                <a href="#lgpd" class="nav-link-custom"><i class="fa-solid fa-shield-halved me-3"></i>LGPD</a>
            </li>
            <li class="nav-item mt-5">
                <a href="login.html" class="nav-link-custom border-orange"><i class="fa-solid fa-right-to-bracket me-3 text-orange"></i>Área Gestor</a>
            </li>
        </ul>
    </nav>

    <div class="sidebar-overlay" id="overlay"></div>

    <main class="content-wrapper">
        <section id="inicio" class="hero-section animate-fade-in">
            <div class="container-fluid py-5">
                <h1 class="display-4 fw-bold mb-4">Sua voz transforma nossa <span class="text-green">escola.</span></h1>
                <p class="lead text-muted mb-5">Canal oficial da EEEP Dom Walfrido Teixeira Vieira.</p>
                
                <div class="action-box p-4 bg-white rounded-4 shadow-sm animate-slide-up">
                    <h5 class="fw-bold mb-3">O que deseja fazer?</h5>
                    <div class="d-flex flex-wrap gap-3">
                        <button class="btn btn-dw-green" id="btnAnonimoOpen">
                            <i class="fa-solid fa-user-secret me-2"></i> Manifestação Anônima
                        </button>
                        <a href="login.html" class="btn btn-outline-dw-orange">
                            <i class="fa-solid fa-id-card me-2"></i> Entrar com Login
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div class="modal fade" id="modalAnonimo" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4">
                <div class="modal-header bg-green text-white">
                    <h5 class="modal-title fw-bold">Novo Relato Anônimo</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="formAnonimoAjax">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Assunto</label>
                            <select class="form-select border-2" required>
                                <option value="">Escolha...</option>
                                <option>Infraestrutura</option>
                                <option>Alimentação</option>
                                <option>Ensino</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Mensagem</label>
                            <textarea class="form-control border-2" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-dw-green w-100 py-2">Enviar Agora</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/script2.js"></script>
</body>
</html>
